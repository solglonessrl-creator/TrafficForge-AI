<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ post.title }} - TrafficForge AI</title>
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-900">
    <main class="max-w-3xl mx-auto px-6 py-12">
        <header class="mb-10">
            <a href="/blog" class="text-indigo-600 font-bold">← Volver al blog</a>
            <h1 class="text-4xl font-black mt-4 leading-tight">{{ post.title }}</h1>
            <p class="text-sm text-slate-500 mt-3">Publicado: {{ post.published_at }}</p>
        </header>

        <article class="prose prose-slate max-w-none bg-white border border-slate-100 rounded-2xl p-8 shadow-sm">
            {{ post.content_html | safe }}
        </article>

        <footer class="mt-10 text-sm text-slate-500">
            <p>Contenido generado para posicionamiento orgánico y conversión responsable.</p>
        </footer>
    </main>
</body>
</html>
